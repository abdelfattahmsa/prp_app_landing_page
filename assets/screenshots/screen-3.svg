<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#fafbfc"/>
  <!-- Top -->
  <rect x="0" y="0" width="800" height="48" fill="#ffffff"/>
  <circle cx="22" cy="24" r="6" fill="#10b981"/>
  <circle cx="42" cy="24" r="6" fill="#e6e8ec"/>
  <circle cx="62" cy="24" r="6" fill="#e6e8ec"/>
  <line x1="0" y1="48" x2="800" y2="48" stroke="#e6e8ec"/>

  <text x="40" y="100" font-family="Inter" font-size="22" font-weight="700" fill="#0a0a0a">This week</text>
  <rect x="40" y="116" width="240" height="10" rx="5" fill="#e6e8ec"/>

  <!-- Stat cards -->
  <g>
    <rect x="40" y="150" width="220" height="96" rx="14" fill="#ffffff" stroke="#e6e8ec"/>
    <rect x="60" y="168" width="70" height="10" rx="5" fill="#5a6170"/>
    <text x="60" y="212" font-family="Inter" font-size="28" font-weight="800" fill="#0a0a0a">24h</text>
    <rect x="60" y="222" width="80" height="8" rx="4" fill="#10b981" opacity="0.5"/>
  </g>
  <g>
    <rect x="280" y="150" width="220" height="96" rx="14" fill="#ffffff" stroke="#e6e8ec"/>
    <rect x="300" y="168" width="70" height="10" rx="5" fill="#5a6170"/>
    <text x="300" y="212" font-family="Inter" font-size="28" font-weight="800" fill="#0a0a0a">37</text>
    <rect x="300" y="222" width="60" height="8" rx="4" fill="#10b981" opacity="0.5"/>
  </g>
  <g>
    <rect x="520" y="150" width="240" height="96" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-opacity="0.35"/>
    <rect x="540" y="168" width="80" height="10" rx="5" fill="#10b981"/>
    <text x="540" y="212" font-family="Inter" font-size="28" font-weight="800" fill="#10b981">+18%</text>
    <rect x="540" y="222" width="100" height="8" rx="4" fill="#10b981"/>
  </g>

  <!-- Chart -->
  <rect x="40" y="270" width="720" height="200" rx="14" fill="#ffffff" stroke="#e6e8ec"/>
  <text x="60" y="296" font-family="Inter" font-size="14" font-weight="600" fill="#5a6170">Focus hours</text>

  <!-- grid -->
  <g stroke="#e6e8ec" stroke-dasharray="3 4">
    <line x1="60" y1="340" x2="740" y2="340"/>
    <line x1="60" y1="390" x2="740" y2="390"/>
    <line x1="60" y1="440" x2="740" y2="440"/>
  </g>

  <!-- bars -->
  <g fill="#10b981">
    <rect x="90"  y="390" width="40" height="50" rx="6"/>
    <rect x="180" y="360" width="40" height="80" rx="6"/>
    <rect x="270" y="340" width="40" height="100" rx="6"/>
    <rect x="360" y="320" width="40" height="120" rx="6"/>
    <rect x="450" y="350" width="40" height="90"  rx="6"/>
    <rect x="540" y="310" width="40" height="130" rx="6"/>
    <rect x="630" y="330" width="40" height="110" rx="6"/>
  </g>
  <g font-family="Inter" font-size="11" fill="#5a6170">
    <text x="100" y="460">Mon</text>
    <text x="190" y="460">Tue</text>
    <text x="278" y="460">Wed</text>
    <text x="370" y="460">Thu</text>
    <text x="462" y="460">Fri</text>
    <text x="550" y="460">Sat</text>
    <text x="640" y="460">Sun</text>
  </g>
</svg>
